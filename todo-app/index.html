<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App — 任务管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>📋 Todo App</h1>
        <p class="todo-subtitle">Open Source Task Manager</p>

        <!-- 输入区域 -->
        <div class="input-section">
            <input type="text" id="todoInput" placeholder="输入新任务..." autofocus>
            <button id="addBtn" onclick="addTodo()">添加</button>
        </div>

        <!-- 过滤器 -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">进行中</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">已完成</button>
        </div>

        <!-- 任务列表 -->
        <ul id="todoList" class="todo-list"></ul>

        <!-- 底部统计 -->
        <div class="todo-footer">
            <span id="itemCount">0 项任务</span>
            <button id="clearBtn" onclick="clearCompleted()">清除已完成</button>
        </div>
    </div>

    <div class="footer">
        <p>Open Source Todo Application — Lab 12 Final Work</p>
        <p>Academic cooperation: North Minzu University × Chiang Mai University (CAMT)</p>
        <p><a href="/">← 返回个人网站</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
