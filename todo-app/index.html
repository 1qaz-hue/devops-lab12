<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App — Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-container">
        <h1>📋 Todo App</h1>
        <p class="todo-subtitle">Open Source Task Manager</p>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Add a new task..." autofocus>
            <button id="addBtn" onclick="addTodo()">Add</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
            <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
            <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
        </div>

        <ul id="todoList" class="todo-list"></ul>

        <div class="todo-footer">
            <span id="itemCount">0 items left</span>
            <button id="clearBtn" onclick="clearCompleted()">Clear completed</button>
        </div>
    </div>

    <div class="footer">
        <p>Open Source Todo Application — Lab 12 Final Work</p>
        <p>Academic cooperation: North Minzu University × Chiang Mai University (CAMT)</p>
        <p><a href="http://98.81.207.231">← Back to Personal Website</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
